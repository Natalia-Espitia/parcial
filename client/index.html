<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Client</title>
</head>
<body>
    <h1>Linear Search</h1>
    <form id="linearSearchForm">
        <label for="linearList">List (comma-separated):</label><br>
        <input type="text" id="linearList" name="list" placeholder="e.g., 10,20,30,40"><br><br>
        <label for="linearValue">Value to Search:</label><br>
        <input type="text" id="linearValue" name="value" placeholder="e.g., 20"><br><br>
        <input type="button" value="Search" onclick="invokeLinearSearch()">
    </form>
    <div id="linearSearchResult"></div>

    <h1>Binary Search</h1>
    <form id="binarySearchForm">
        <label for="binaryList">List (comma-separated, sorted):</label><br>
        <input type="text" id="binaryList" name="list" placeholder="e.g., 10,20,30,40"><br><br>
        <label for="binaryValue">Value to Search:</label><br>
        <input type="text" id="binaryValue" name="value" placeholder="e.g., 20"><br><br>
        <input type="button" value="Search" onclick="invokeBinarySearch()">
    </form>
    <div id="binarySearchResult"></div>

    <script>
        // Function to invoke the linear search service
        function invokeLinearSearch() {
            const list = document.getElementById("linearList").value.trim();
            const value = document.getElementById("linearValue").value.trim();

            if (!list || !value) {
                document.getElementById("linearSearchResult").innerHTML = "<p>Error: Both fields are required.</p>";
                return;
            }

            const url = `/linearsearch?list=${encodeURIComponent(list)}&value=${encodeURIComponent(value)}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to fetch data from the server.");
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById("linearSearchResult").innerHTML = `
                        <h3>Linear Search Result:</h3>
                        <p>Operation: ${data.operation}</p>
                        <p>Input List: ${data.inputlist}</p>
                        <p>Value: ${data.value}</p>
                        <p>Output: ${data.output}</p>
                    `;
                })
                .catch(error => {
                    document.getElementById("linearSearchResult").innerHTML = `<p>Error: ${error.message}</p>`;
                });
        }

        // Function to invoke the binary search service
        function invokeBinarySearch() {
            const list = document.getElementById("binaryList").value.trim();
            const value = document.getElementById("binaryValue").value.trim();

            if (!list || !value) {
                document.getElementById("binarySearchResult").innerHTML = "<p>Error: Both fields are required.</p>";
                return;
            }

            const url = `/binarysearch?list=${encodeURIComponent(list)}&value=${encodeURIComponent(value)}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to fetch data from the server.");
                    }
                    return response.json();
                })
                .then(data => {
                    document.getElementById("binarySearchResult").innerHTML = `
                        <h3>Binary Search Result:</h3>
                        <p>Operation: ${data.operation}</p>
                        <p>Input List: ${data.inputlist}</p>
                        <p>Value: ${data.value}</p>
                        <p>Output: ${data.output}</p>
                    `;
                })
                .catch(error => {
                    document.getElementById("binarySearchResult").innerHTML = `<p>Error: ${error.message}</p>`;
                });
        }
    </script>
</body>
</html>
